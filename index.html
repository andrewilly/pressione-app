<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pressione Arteriosa - Clinical System</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- HEADER CLINICO MODERNO -->
  <div class="header">

    <div class="title">Monitor Pressione Arteriosa</div>

    <div class="subtitle">
      Clinical Monitoring System
    </div>

    <div class="divider"></div>

    <div class="credits">
      Sistema sviluppato da André Willy Rizzo
    </div>

  </div>

  <form id="form">
    <input type="date" id="date" required>

    <input type="number" id="systolic" placeholder="Sistolica (mmHg)" required>
    <input type="number" id="diastolic" placeholder="Diastolica (mmHg)" required>

    <input type="number" id="pulse" placeholder="Pulsazioni (bpm)">

    <button type="submit">Registra misurazione</button>
  </form>

  <div id="stats"></div>

  <div id="aiReport"></div>

  <div class="list-box">
    <ul id="list"></ul>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
