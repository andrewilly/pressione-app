<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ESC/EHS Pressure Monitor</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="header">
    <div class="title">Monitor Pressione Arteriosa</div>
    <div class="subtitle">ESC / EHS Classification System</div>
    <div class="divider"></div>
    <div class="credits">Sistema sviluppato da André Willy Rizzo</div>
  </div>

  <form id="form">
    <input type="date" id="date" required>

    <input type="number" id="systolic" placeholder="Sistolica (mmHg)" required>
    <input type="number" id="diastolic" placeholder="Diastolica (mmHg)" required>

    <input type="number" id="pulse" placeholder="Pulsazioni (bpm)">

    <button type="submit">Registra</button>
  </form>

  <div id="stats"></div>

  <div id="escReport"></div>

  <div class="list-box">
    <ul id="list"></ul>
  </div>

</div>

<script src="app.js"></script>

</body>
</html>
