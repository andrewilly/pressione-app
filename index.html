<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monitor Pressione Arteriosa</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <h2>Monitor Pressione Arteriosa</h2>

  <form id="form">
    <input type="date" id="date" required>

    <input type="number" id="systolic" placeholder="Sistolica" required>
    <input type="number" id="diastolic" placeholder="Diastolica" required>

    <input type="number" id="pulse" placeholder="Pulsazioni (bpm)">

    <button type="submit">Salva</button>
  </form>

  <!-- MEDIA -->
  <div id="stats"></div>

  <!-- AI CLINICA -->
  <div id="aiReport"></div>

  <!-- GRAFICO -->
  <div class="chart-box">
    <canvas id="chart"></canvas>
  </div>

  <!-- LISTA MISURAZIONI -->
  <div class="list-box">
    <ul id="list"></ul>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>

</body>
</html>
